name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exec_board
  # The migration-created default (prisma/migrations/*_tenancy_rls) — fine
  # to use as-is in CI's ephemeral DB; only local/persistent dev DBs need
  # the real rotation in scripts/setup-db-role.sh.
  APP_DATABASE_URL: postgresql://exec_board_app:changeme-rotate-immediately@localhost:5432/exec_board

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exec_board
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d exec_board"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exec_board
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d exec_board"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Seed a test user and PAT
        run: |
          OUTPUT=$(node scripts/issue-token.mts e2e-ci-user)
          echo "$OUTPUT"
          TOKEN=$(echo "$OUTPUT" | tail -1)
          echo "PAT_JAXZ=$TOKEN" >> "$GITHUB_ENV"
      - name: Start the app
        run: |
          npm run start &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/health && break; sleep 1; done
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/

  prisma-migrate-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exec_board
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d exec_board"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma migrate diff --from-schema-datasource prisma/schema.prisma --to-schema-datamodel prisma/schema.prisma --exit-code
